<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOOGLE — Pro Cloud Gallery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        gold: { 300: '#F0D878', 400: '#E8C864', 500: '#C8A24E', 600: '#A8853E', 700: '#8B6914' },
                        surface: { 950: '#050505', 900: '#080808', 800: '#0F0F0F', 700: '#161616', 600: '#1E1E1E', 500: '#2A2A2A' }
                    },
                    fontFamily: {
                        display: ['"Playfair Display"', 'serif'],
                        body: ['"DM Sans"', 'sans-serif'],
                    },
                    animation: {
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'float': 'float 6s ease-in-out infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-20px)' },
                        }
                    }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --gold: #C8A24E;
            --gold-light: #E8C864;
            --gold-glow: rgba(200, 162, 78, 0.3);
            --bg: #050505;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-primary: #F5F0E8;
            --text-secondary: #8A8478;
        }

        body {
            background: var(--bg);
            color: var(--text-primary);
            font-family: 'DM Sans', sans-serif;
            overflow-x: hidden;
        }

        .glass-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            border-radius: 24px;
            position: relative;
            overflow: hidden;
        }

        .page {
            display: none;
            min-height: 100vh;
            opacity: 0;
            transition: opacity 0.8s ease;
        }

        .page.active {
            display: flex;
            flex-direction: column;
            opacity: 1;
        }

        .masonry-grid {
            column-count: 2;
            column-gap: 16px;
        }

        @media (min-width: 768px) {
            .masonry-grid {
                column-count: 3;
                column-gap: 20px;
            }
        }

        @media (min-width: 1200px) {
            .masonry-grid {
                column-count: 4;
                column-gap: 24px;
            }
        }

        .masonry-item {
            break-inside: avoid;
            margin-bottom: 20px;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            cursor: pointer;
            opacity: 0;
            transform: translateY(30px);
            animation: revealItem 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        @keyframes revealItem {
            to { opacity: 1; transform: translateY(0); }
        }

        .masonry-item img {
            width: 100%;
            height: auto;
            display: block;
            transition: transform 0.6s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .masonry-item:hover img { transform: scale(1.08); }

        .masonry-item::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.4) 0%, transparent 40%);
            opacity: 1;
            transition: opacity 0.4s;
            pointer-events: none;
        }

        .cloud-badge {
            position: absolute;
            top: 12px;
            left: 12px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--gold-light);
            padding: 4px 8px;
            border-radius: 8px;
            font-size: 8px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 4px;
            z-index: 10;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .lightbox {
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: #000000;
            display: none;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .lightbox.open { display: flex; opacity: 1; }

        .lightbox-content {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .lightbox img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            animation: zoomIn 0.3s ease-out;
        }

        @keyframes zoomIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .hero-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, var(--gold-glow) 0%, transparent 70%);
            filter: blur(60px);
            opacity: 0.4;
            pointer-events: none;
            z-index: -1;
        }

        #marketingModal {
            position: fixed;
            inset: 0;
            z-index: 2000;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        #marketingModal.open { display: block; opacity: 1; }

        .marketing-card {
            background: #050505;
            border-top: 2px solid var(--gold);
            width: 100%;
            max-width: 500px;
            border-radius: 32px 32px 0 0;
            padding: 40px 24px calc(60px + env(safe-area-inset-bottom, 20px)) 24px;
            position: absolute;
            left: 50%;
            bottom: 0;
            transform: translate(-50%, 100%);
            transition: transform 0.5s cubic-bezier(0.22, 1, 0.36, 1);
        }

        #marketingModal.open .marketing-card { transform: translate(-50%, 0); }

        .service-tag {
            background: rgba(200, 162, 78, 0.1);
            border: 1px solid rgba(200, 162, 78, 0.2);
            padding: 8px 16px;
            border-radius: 12px;
            font-size: 11px;
            color: var(--gold-light);
            font-weight: 700;
            text-transform: uppercase;
        }
    </style>
</head>

<body class="min-h-screen antialiased selection:bg-gold-500 selection:text-black">

    <!-- Landing Page -->
    <div id="pageLanding" class="page active relative overflow-hidden">
        <div class="hero-glow animate-float"></div>
        <main class="flex-1 flex flex-col items-center justify-center p-6 text-center">
            <div class="mb-12 animate-float">
                <i class="fa-solid fa-shield-halved text-7xl text-gold-500 mb-6 block drop-shadow-[0_0_15px_rgba(200,162,78,0.5)]"></i>
                <h1 class="font-display text-4xl sm:text-7xl font-bold tracking-tight mb-4 text-white">
                    PRIVACY<span class="text-gold-500 italic">First</span>
                </h1>
                <p class="text-text-secondary text-lg max-w-sm mx-auto leading-relaxed">
                    Personalized event gallery. <br>
                    <span class="text-gold-300 font-medium">Verify your face to view your photos.</span>
                </p>
            </div>

            <div class="w-full max-w-sm glass-card p-1">
                <button onclick="startVerification()"
                    class="group relative w-full bg-gold-500 overflow-hidden text-black font-bold py-5 rounded-[22px] transition-all hover:bg-gold-400">
                    <span class="relative z-10 flex items-center justify-center gap-3 text-lg">
                        IDENTIFY TO ACCESS
                        <i class="fa-solid fa-user-check animate-pulse"></i>
                    </span>
                </button>
            </div>
        </main>
    </div>

    <!-- Gallery Page -->
    <div id="pageGallery" class="page bg-surface-950">
        <header class="sticky top-0 z-50 bg-black/60 backdrop-blur-xl border-b border-white/5 px-4 sm:px-6 py-3 sm:py-4">
            <div class="max-w-7xl mx-auto flex items-center justify-between">
                <div class="flex items-center gap-2 sm:gap-3">
                    <button onclick="location.reload()" class="w-8 h-8 rounded-full border border-white/10 flex items-center justify-center text-text-secondary">
                        <i class="fa-solid fa-chevron-left text-[10px]"></i>
                    </button>
                    <div class="flex flex-col">
                        <span id="photoCount" class="font-bold text-xs sm:text-sm text-gold-500">0 Photos</span>
                        <p class="text-[7px] sm:text-[8px] text-text-secondary uppercase tracking-widest font-bold">Live Gallery</p>
                    </div>
                </div>
            </div>
        </header>

        <main class="flex-1 max-w-7xl mx-auto w-full p-4 sm:p-8">
            <div id="filterStatus" class="flex items-center justify-between bg-gold-500/10 border border-gold-500/20 p-4 rounded-2xl mb-8">
                <div class="flex items-center gap-3 text-gold-500"><i class="fa-solid fa-lock"></i> Secured View Only</div>
            </div>
            <div class="masonry-grid" id="galleryGrid"></div>
        </main>
    </div>

    <!-- Selfie / Camera Modal -->
    <div id="selfieModal" class="fixed inset-0 z-[1000] bg-black/95 backdrop-blur-xl hidden items-center justify-center p-4">
        <div class="w-full max-w-md bg-surface-900 border border-white/10 rounded-[32px] overflow-hidden relative">
            <button onclick="closeSelfieModal()" class="absolute top-4 right-4 w-10 h-10 rounded-full bg-white/5 flex items-center justify-center text-white/50 z-10"><i class="fa-solid fa-xmark"></i></button>
            <div class="relative aspect-[3/4] bg-black flex items-center justify-center overflow-hidden">
                <video id="webcam" autoplay playsinline class="w-full h-full object-cover transition-all"></video>
                <canvas id="snapshot" class="hidden"></canvas>
            </div>
            <div class="p-8 text-center">
                <h2 class="font-display text-2xl font-bold text-white mb-2">Selfie Search</h2>
                <button id="captureBtn" onclick="takeSnapshot()" class="w-full bg-gold-500 text-black font-bold py-5 rounded-2xl flex items-center justify-center gap-3">
                    <i class="fa-solid fa-camera"></i> CAPTURE & SEARCH
                </button>
            </div>
        </div>
    </div>

    <!-- Global Search Overlay -->
    <div id="searchOverlay" class="fixed inset-0 z-[3000] bg-black/90 backdrop-blur-xl hidden flex-col items-center justify-center text-center p-8">
        <div class="w-24 h-24 relative mb-8">
            <div class="absolute inset-0 border-8 border-gold-500/10 rounded-full"></div>
            <div class="absolute inset-0 border-8 border-gold-500 border-t-transparent rounded-full animate-spin"></div>
        </div>
        <h3 class="font-display text-3xl font-bold text-white mb-4 animate-pulse">MATCHING YOUR FACE</h3>
        <p class="text-gold-500/80 text-sm tracking-[0.2em] font-bold">Scanning Cloud Gallery...</p>
    </div>

    <!-- Lightbox -->
    <div id="lightbox" class="lightbox">
        <div class="absolute top-6 right-6 text-white/50 text-4xl cursor-pointer" onclick="closeLightbox()"><i class="fa-solid fa-xmark"></i></div>
        <div class="lightbox-content" onclick="closeLightbox()"><img id="lbImg" src=""><div class="absolute bottom-8 left-1/2 -translate-x-1/2">
            <a id="lbDownload" href="" download class="bg-gold-500 text-black font-bold px-8 py-4 rounded-full">SAVE TO DEVICE</a>
        </div></div>
    </div>

    <!-- Marketing Modal -->
    <div id="marketingModal" onclick="closeMarketing()"><div class="marketing-card" onclick="event.stopPropagation()">
        <h2 class="font-display text-center text-4xl text-white mb-8">GOOGLE GALLERY</h2>
        <div class="grid grid-cols-2 gap-4"><a href="tel:8951085997" class="p-6 glass-card text-center">CALL GOKUL</a><a href="https://wa.me/918951085997" class="p-6 glass-card text-center">WHATSAPP</a></div>
    </div></div>

    <script>
        let currentImages = [];
        let filteredImages = null;
        let marketingShown = false;
        let stream = null;
        let filteredNames = null;

        // Global Backend Detection
        const tunnelUrl = window.location.hash.substring(1);
        const apiBase = tunnelUrl ? tunnelUrl : '';

        window.onload = () => {
            if (window.history && window.history.pushState) {
                window.history.pushState('forward', null, './#forward');
                window.onpopstate = () => { if (!marketingShown) showMarketing(); window.history.pushState('forward', null, './#forward'); };
            }
        };

        function showMarketing() { marketingShown = true; const modal = document.getElementById('marketingModal'); modal.style.display = 'flex'; setTimeout(() => modal.classList.add('open'), 10); }
        function closeMarketing() { const modal = document.getElementById('marketingModal'); modal.classList.remove('open'); setTimeout(() => modal.style.display = 'none', 500); }
        function startVerification() { openSelfieModal(); }

        function accessGallery() {
            document.getElementById('pageLanding').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('pageLanding').classList.remove('active');
                const gallery = document.getElementById('pageGallery');
                gallery.classList.add('active');
                setTimeout(() => gallery.style.opacity = '1', 50);
                setInterval(() => { if (filteredImages) loadPhotos(); }, 4000);
            }, 600);
        }

        async function openSelfieModal() {
            const modal = document.getElementById('selfieModal');
            const video = document.getElementById('webcam');
            modal.style.display = 'flex';
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
                video.srcObject = stream;
            } catch (err) { alert("Camera access denied."); }
        }

        function closeSelfieModal() {
            if (stream) stream.getTracks().forEach(track => track.stop());
            document.getElementById('selfieModal').style.display = 'none';
        }

        async function takeSnapshot() {
            const video = document.getElementById('webcam');
            const canvas = document.getElementById('snapshot');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);

            const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', 0.8));
            closeSelfieModal();
            document.getElementById('searchOverlay').classList.remove('hidden');

            try {
                const formData = new FormData();
                formData.append('selfie', blob, 'selfie.jpg');
                await processSelfie(formData);
            } catch (err) {
                alert("Connection failed.");
            } finally {
                document.getElementById('searchOverlay').classList.add('hidden');
            }
        }

        async function processSelfie(formData) {
            if (!apiBase && window.location.hostname !== 'localhost') { alert("Not Connected to Event Server."); return; }
            try {
                const response = await fetch(`${apiBase}/api/face-search`, {
                    method: 'POST',
                    headers: { 'Bypass-Tunnel-Reminder': 'true' },
                    body: formData
                });
                const result = await response.json();
                if (result.matches && result.matches.length > 0) {
                    filteredImages = result.matches;
                    document.getElementById('photoCount').textContent = `${filteredImages.length} Photos`;
                    renderGrid(filteredImages);
                    if (document.getElementById('pageLanding').classList.contains('active')) accessGallery();
                } else {
                    alert("No photos found of you yet.");
                }
            } catch (err) { alert("Search failed."); }
        }

        async function loadPhotos() {
            if (filteredImages && filteredImages[0].url.startsWith('http')) return;
            try {
                const response = await fetch(`${apiBase}/api/photos`, { headers: { 'Bypass-Tunnel-Reminder': 'true' } });
                const allPhotos = await response.json();
                currentImages = allPhotos;
                if (filteredNames) {
                    filteredImages = allPhotos.filter(img => filteredNames.includes(img.name));
                    renderGrid(filteredImages);
                }
            } catch (err) {}
        }

        function renderGrid(images) {
            const grid = document.getElementById('galleryGrid');
            grid.innerHTML = '';
            images.forEach((img, index) => {
                const item = document.createElement('div');
                item.className = 'masonry-item group';
                item.style.animationDelay = `${index * 0.1}s`;
                item.onclick = () => openLightbox(img.url);
                const imgEl = document.createElement('img');
                imgEl.src = img.url;
                const badge = document.createElement('div');
                badge.className = 'cloud-badge';
                badge.innerHTML = '<i class="fa-solid fa-cloud"></i> Cloud Live';
                item.appendChild(imgEl);
                item.appendChild(badge);
                grid.appendChild(item);
            });
        }

        function openLightbox(url) {
            const lb = document.getElementById('lightbox');
            document.getElementById('lbImg').src = url;
            document.getElementById('lbDownload').href = url;
            lb.classList.add('open');
        }

        function closeLightbox() { document.getElementById('lightbox').classList.remove('open'); }
    </script>
</body>

</html>
